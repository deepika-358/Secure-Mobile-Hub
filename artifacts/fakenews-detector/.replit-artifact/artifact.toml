kind = "web"
previewPath = "/"
title = "Fake News Detection System"
version = "1.0.0"
id = "artifacts/fakenews-detector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25171

[services.development]
run = "pnpm --filter @workspace/fakenews-detector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fakenews-detector", "run", "build" ]
publicDir = "artifacts/fakenews-detector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25171"
BASE_PATH = "/"
