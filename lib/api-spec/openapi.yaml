openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Fake News Detection System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Article detection operations
  - name: admin
    description: Admin operations
  - name: stats
    description: Statistics operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List all analyzed articles
      parameters:
        - name: verdict
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
    post:
      operationId: submitArticle
      tags: [articles]
      summary: Submit article for fake news detection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Article submitted and analyzed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete article (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /articles/{id}/verdict:
    patch:
      operationId: overrideVerdict
      tags: [articles]
      summary: Admin override verdict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerdictOverride"
      responses:
        "200":
          description: Verdict updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/recent:
    get:
      operationId: getRecentDetections
      tags: [stats]
      summary: Get recent detection activity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent detections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"

  /stats/daily:
    get:
      operationId: getDailyStats
      tags: [stats]
      summary: Get daily detection counts for chart
      responses:
        "200":
          description: Daily stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyStat"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCredentials"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin session info
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    Article:
      type: object
      required: [id, title, content, verdict, confidence, explanation, source, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        url:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        verdict:
          type: string
          enum: [real, fake, uncertain]
        confidence:
          type: number
        explanation:
          type: string
        indicators:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, analyzed]
        adminOverride:
          type: boolean
        createdAt:
          type: string

    ArticleInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 3
        content:
          type: string
          minLength: 10
        url:
          type: string
        source:
          type: string

    VerdictOverride:
      type: object
      required: [verdict]
      properties:
        verdict:
          type: string
          enum: [real, fake, uncertain]
        explanation:
          type: string

    StatsSummary:
      type: object
      required: [total, fake, real, uncertain, fakePercent, realPercent, todayCount, avgConfidence]
      properties:
        total:
          type: integer
        fake:
          type: integer
        real:
          type: integer
        uncertain:
          type: integer
        fakePercent:
          type: number
        realPercent:
          type: number
        todayCount:
          type: integer
        avgConfidence:
          type: number

    DailyStat:
      type: object
      required: [date, total, fake, real, uncertain]
      properties:
        date:
          type: string
        total:
          type: integer
        fake:
          type: integer
        real:
          type: integer
        uncertain:
          type: integer

    AdminCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AdminSession:
      type: object
      required: [username, role]
      properties:
        username:
          type: string
        role:
          type: string
